name: Seed upcoming releases 2026 H2 (one-shot)

# Adds Pokemon TCG sets releasing between Aug 2026 and Jan 2027 to the
# catalog so /drops Release Calendar carries an Upcoming section
# beyond just 30th Celebration. Idempotent — only adds ids that don't
# already exist. Dry-run flag surfaces the plan without writes.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (print plan, no writes)"
        required: false
        default: "false"

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="--dry-run"
          fi
          python -m scripts.seed_upcoming_releases_2026h2 $args
