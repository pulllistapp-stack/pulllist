name: Admin — delete post

# Destructive admin tool. Deletes a post (published or draft) by
# slug. Mirrors admin-dump-post but with the DELETE verb. Useful
# pre-regen: delete a stale draft, then run the daily-newsbot
# workflow with post_limit=N to let dedupe pick it up as fresh
# again and re-process with the latest extractor/prompt.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug of the post to delete'
        required: true
        type: string

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install httpx
        run: pip install 'httpx>=0.27,<1.0'
      - name: Delete post
        env:
          PULLLIST_API_BASE: ${{ secrets.PULLLIST_API_BASE || 'https://api.pulllist.org/api/v1' }}
          NEWSBOT_ADMIN_EMAIL: ${{ secrets.NEWSBOT_ADMIN_EMAIL }}
          NEWSBOT_ADMIN_PASSWORD: ${{ secrets.NEWSBOT_ADMIN_PASSWORD }}
          DELETE_SLUG: ${{ inputs.slug }}
        run: python -m scripts.admin_delete_post
