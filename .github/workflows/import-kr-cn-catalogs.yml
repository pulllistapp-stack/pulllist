name: Import KR + CN catalogs (TCGdex)

# One-shot ingest of the Korean and Chinese Simplified catalogs from
# TCGdex, running against prod via secrets.DATABASE_URL. Uses the
# same script that already handles JP (import_jp_catalog.py) with
# the --lang flag. Idempotent: existing rows skipped unless --refresh.
#
# TCGdex coverage as of 2026-07-16:
#   - ko:    95 sets
#   - zh-cn: 57 sets
#
# Sets phase runs first (fast, ~30s per language) so /sets?language=ko
# is browsable immediately. Cards phase runs after (~10-15 min per
# language depending on TCGdex response time). Splitting them into
# two steps lets the workflow fail one language without eating the
# entire run.

on:
  workflow_dispatch:
    inputs:
      lang:
        description: "Which language(s) to import"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - ko
          - zh-cn
      sets_only:
        description: "Only import sets (skip per-card fetch)"
        required: false
        default: "false"
      refresh:
        description: "Re-pull cards already in DB (slower)"
        required: false
        default: "false"

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Nuke any bare (unprefixed) KR/CN rows from earlier runs
        # Phase 1's first ingest landed 15 KR + 49 CN sets under bare
        # TCGdex ids (SV3, CSA, CSV1C…), which then collide with JP
        # sets of the same id. Phase 1d.1 switched to prefixed ids
        # ('ko-SV3', 'zhcn-CSV1C'). Nuke the bare rows so re-ingest
        # can write them under the correct prefixed ids without
        # tripping the "different language, refusing to overwrite"
        # guard. Idempotent: after this migration lands, subsequent
        # runs of this step delete 0 rows.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python <<'PY'
          import asyncio
          from sqlalchemy import text
          from app.database import SessionLocal, init_db

          async def main():
              await init_db()
              async with SessionLocal() as db:
                  for lang in ('ko', 'zh-cn'):
                      prefix = 'ko-' if lang == 'ko' else 'zhcn-'
                      # Cards first (FK dependency), then sets.
                      c = await db.execute(text(
                          "DELETE FROM cards WHERE language = :l "
                          "AND id NOT LIKE :p"
                      ), {"l": lang, "p": f"{prefix}%"})
                      s = await db.execute(text(
                          "DELETE FROM sets WHERE language = :l "
                          "AND id NOT LIKE :p"
                      ), {"l": lang, "p": f"{prefix}%"})
                      await db.commit()
                      print(f"  {lang:>6s}: nuked {s.rowcount} bare sets + {c.rowcount} bare cards")

          asyncio.run(main())
          PY

      - name: Import KR sets (${{ inputs.lang == 'zh-cn' && 'skipped' || 'running' }})
        if: inputs.lang == 'both' || inputs.lang == 'ko'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
        run: |
          args="--lang ko"
          if [ "${{ inputs.sets_only }}" = "true" ]; then
            args="$args --sets-only"
          fi
          if [ "${{ inputs.refresh }}" = "true" ]; then
            args="$args --refresh"
          fi
          python -m scripts.import_jp_catalog $args

      - name: Import CN Simplified sets (${{ inputs.lang == 'ko' && 'skipped' || 'running' }})
        if: inputs.lang == 'both' || inputs.lang == 'zh-cn'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
        run: |
          args="--lang zh-cn"
          if [ "${{ inputs.sets_only }}" = "true" ]; then
            args="$args --sets-only"
          fi
          if [ "${{ inputs.refresh }}" = "true" ]; then
            args="$args --refresh"
          fi
          python -m scripts.import_jp_catalog $args

      - name: KR — fill cards from collectory.cc (bridges TCGdex's empty arrays)
        # TCGdex's /ko/sets/{id} returns metadata but empty `cards`
        # arrays for most KR sets. collectory.cc (a Korean fan archive)
        # has native KR card data — name_ko, KR-scanned images, rarity,
        # card number. This step matches each collectory set to one
        # of the TCGdex-ingested ko-* set rows (via set_code_ja or
        # fuzzy name match on name_ko) and upserts its cards under
        # the same set_id so the URLs stay consistent.
        if: inputs.lang == 'both' || inputs.lang == 'ko'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
        run: |
          args=""
          if [ "${{ inputs.sets_only }}" = "true" ]; then
            # sets_only means "just refresh set metadata this run";
            # collectory's whole reason for existing here is the card
            # content, so skip it when sets_only is on.
            echo "sets_only=true — skipping collectory card fill"
            exit 0
          fi
          python -m scripts.import_kr_from_collectory $args

      - name: Summary
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python <<'PY'
          import asyncio
          from sqlalchemy import text
          from app.database import SessionLocal, init_db

          async def main():
              await init_db()
              async with SessionLocal() as db:
                  for lang in ('ko', 'zh-cn'):
                      s = (await db.execute(
                          text("SELECT COUNT(*) FROM sets WHERE language = :l"),
                          {"l": lang},
                      )).scalar_one()
                      c = (await db.execute(
                          text("SELECT COUNT(*) FROM cards WHERE language = :l"),
                          {"l": lang},
                      )).scalar_one()
                      print(f"  {lang:>6s}: sets={s}  cards={c}")

          asyncio.run(main())
          PY
