name: Monthly illustrator feature

# Phase B Sprint 4 — publishes a Collectory-style artist feature on
# the 15th of every month. Auto-picks the top illustrator among
# chase-tier cards; override with ILLUSTRATOR_FEATURE_ARTIST secret
# to hand-pick.

on:
  schedule:
    # 15th at 14:30 UTC = EDT 10:30 AM. Two weeks after the monthly
    # price-club post so both cadences overlap once a quarter, giving
    # the reader roughly one data-driven story per fortnight.
    - cron: "30 14 15 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (1 = generate + log only; 0 = publish draft)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '0'
      artist:
        description: 'Override the auto-pick with an exact artist name. Leave empty to auto-rotate.'
        required: false
        default: ''
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/newsbot/requirements.txt

      - name: Install newsbot deps
        run: pip install -r newsbot/requirements.txt

      - name: Run newsbot (illustrator_feature only)
        env:
          PULLLIST_API_BASE: ${{ secrets.PULLLIST_API_BASE || 'https://api.pulllist.org/api/v1' }}
          NEWSBOT_ADMIN_EMAIL: ${{ secrets.NEWSBOT_ADMIN_EMAIL }}
          NEWSBOT_ADMIN_PASSWORD: ${{ secrets.NEWSBOT_ADMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ILLUSTRATOR_FEATURE_ENABLED: "1"
          # Manual-dispatch input beats the schedule fire (input is
          # empty on schedule). Auto-pick when both are empty.
          ILLUSTRATOR_FEATURE_ARTIST: ${{ inputs.artist || '' }}
          PRICE_CLUB_ENABLED: "0"
          SET_OVERVIEW_ENABLED: "0"
          MARKET_REPORT_ENABLED: "0"
          WEB_SEARCH_ENABLED: "0"
          DAILY_POST_LIMIT: "1"
          DRY_RUN: ${{ inputs.dry_run || '0' }}
          LOG_LEVEL: INFO
        run: python -m newsbot.main
