name: Daily eBay price snapshot

on:
  schedule:
    # 07:00 UTC every day = 03:00 EDT (Atlanta, summer) / 02:00 EST (winter).
    # Scheduled overnight so fresh data is ready by morning. GitHub commonly
    # delays scheduled runs 30-90min, so expect actual start between
    # 07:30-08:30 UTC (03:30-04:30 EDT). GitHub Actions cron is always UTC
    # and does not honor DST — pick a UTC time that lands overnight in both
    # EDT and EST.
    - cron: "0 7 * * *"
  workflow_dispatch: # also runnable manually from the Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest
    # Bumped from 30m → 90m. With ~580+ eligible cards × 150ms throttle +
    # eBay round-trip + DB write, the full catalog won't finish under 30m.
    # GitHub Actions free tier allows up to 6h, so 90m is comfortably safe.
    timeout-minutes: 90
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eBay snapshot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EBAY_ENV: production
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          STORE_ID: "1182"
          ZIP: "29615"
          STATE: "SC"
          LATITUDE: "34.873413"
          LONGITUDE: "-82.327458"
          LOG_LEVEL: INFO
        # Quota strategy: keep the daily cron well under the 5,000/day
        # Browse API ceiling so live-listings + notification polling +
        # ad-hoc backfills can share the budget.
        #   --min-price 10  : $5-10 cards rely on TCGCSV daily sync alone;
        #                     no eBay double-check (which adds little signal
        #                     at that price). When a $7 card jumps past $10
        #                     in TCGCSV, the next cron picks it up
        #                     automatically (market_price_usd is refreshed
        #                     daily by sync_tcgcsv_daily.py).
        #   --max-calls 3500: leaves ~1,500 colls/day for browsing +
        #                     wishlist alert polling (planned).
        run: |
          python -m scripts.snapshot_ebay \
            --max-calls 3500 \
            --min-price 10 \
            --throttle-ms 150
