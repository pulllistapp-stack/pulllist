name: Daily eBay price snapshot

on:
  schedule:
    # 03:00 UTC every day  =  22:00 EST (previous day) / 23:00 EDT
    - cron: "0 3 * * *"
  workflow_dispatch: # also runnable manually from the Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eBay snapshot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EBAY_ENV: production
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          STORE_ID: "1182"
          ZIP: "29615"
          STATE: "SC"
          LATITUDE: "34.873413"
          LONGITUDE: "-82.327458"
          LOG_LEVEL: INFO
        run: |
          python -m scripts.snapshot_ebay \
            --max-calls 4500 \
            --min-price 5 \
            --throttle-ms 150
