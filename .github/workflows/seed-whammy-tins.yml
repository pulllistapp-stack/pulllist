name: Seed Triple Whammy Tins (one-shot)

# Adds the 3 Triple Whammy Tin variants (Tyranitar, Darkrai, Slaking)
# to sv09 (Journey Together) and sv10 (Destined Rivals) sealed
# product lists. Mirrors: sv09 canonical row + sv10 mirror. Fetches
# real prices from TCGCSV MCAP group (2374). Idempotent.

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scripts.seed_whammy_tins
