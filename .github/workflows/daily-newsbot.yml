name: Daily news bot

# Cron enabled after Phase 1 lived through 3+ clean dry-runs and
# multiple successful live runs. Manual trigger still available for
# backfilling / off-cycle posts.

on:
  schedule:
    # 12:00 UTC = 21:00 KST = 8am ET. After the eBay (07:00 UTC) +
    # TCGplayer (08:00 UTC) snapshots so all three workflows don't
    # contend on the Render free tier at the same time.
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (1 = crawl + generate + log only; 0 = publish drafts)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '0'
      post_limit:
        description: 'Override daily_post_limit for this run (blank = default 2). Use for backfills.'
        required: false
        default: ''
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    # Generation per item is ~30-60s of Claude latency plus crawl +
    # fact-check. 30m is plenty even with the daily_post_limit ceiling.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/newsbot/requirements.txt

      - name: Install newsbot deps
        run: pip install -r newsbot/requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('backend/newsbot/requirements.txt') }}

      - name: Install Scrapling browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: scrapling install

      - name: Run newsbot
        env:
          # API target — override via the optional repo secret to point at staging.
          PULLLIST_API_BASE: ${{ secrets.PULLLIST_API_BASE || 'https://api.pulllist.org/api/v1' }}
          NEWSBOT_ADMIN_EMAIL: ${{ secrets.NEWSBOT_ADMIN_EMAIL }}
          NEWSBOT_ADMIN_PASSWORD: ${{ secrets.NEWSBOT_ADMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          # Per-run override > org secret > built-in default of 2. Lets
          # manual backfill runs pull 6+ articles in one shot without
          # touching repo secrets or chaining three separate triggers.
          DAILY_POST_LIMIT: ${{ inputs.post_limit || secrets.DAILY_POST_LIMIT || '2' }}
          # Schedule fires don't carry inputs — fall back to '0' (live)
          # so the daily cron posts drafts. Manual UI triggers keep
          # their explicit '1' / '0' choice; the input default is '1'
          # so a fat-fingered manual run can't accidentally publish.
          DRY_RUN: ${{ inputs.dry_run || '0' }}
          LOG_LEVEL: INFO
        run: python -m newsbot.main
