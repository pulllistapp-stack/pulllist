name: Ingest JP sealed products (one-shot)

# Manual-only. Pulls sealed SKUs (booster boxes, packs, ETBs, card file
# sets, starter decks…) for every JP TCGCSV group whose abbreviation
# matches one of our JP sets, inserts them into `products` with USD
# prices, and refreshes `products.market_price_usd/low/high` on
# subsequent runs.
#
# Runs against the real Neon prod DB via ``secrets.DATABASE_URL`` —
# ``ingest_jp_sealed.py`` is idempotent (upsert on productId), so
# re-triggering only adds newly-listed sealed SKUs or updates changed
# prices. Safe to click any time; ~1 min run.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (print matches, don't write)"
        required: false
        default: "false"
      only:
        description: "Limit to a single TCGCSV abbreviation (e.g. SV11B). Blank = all matched groups."
        required: false
        default: ""
      report_gaps:
        description: "Diagnostic: list unmatched TCGCSV groups with sealed SKUs (no writes; skips seeding steps)."
        required: false
        default: "false"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed missing JP set stubs
        # Idempotent — creates the sealed-focused stub sets that don't
        # yet exist (SBC, JPP-M, CLL/CLV/CLF, NPF1/NPF2/NPF3, PtA-GF/LP)
        # so the ingest step below can attach their sealed SKUs.
        # Skipped when `only` scopes the ingest to a single abbr, or
        # when running in report-gaps mode (diagnostic-only) — seeding
        # is only relevant to the full-catalog write pass.
        if: inputs.only == '' && inputs.report_gaps != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          python -m scripts.seed_missing_jp_sealed_sets $args

      - name: Merge 25th Anniversary family into S8a (one-shot; idempotent)
        # LO decided the 3-way split (S8a / S8a-P / S8a-G) is the wrong
        # UX — collectors think of the 25th Anniversary release as one
        # product line (TCG Republic groups it that way too). This step
        # moves any sealed rows off S8a-P/S8a-G onto S8a, deletes the
        # now-empty sub-set cards + set rows, and lifts S8a.total to 70
        # (30 base + 25 promo + 15 golden). The card-import step below
        # then re-imports the promo+golden groups directly into S8a
        # with number prefixes "P" and "G".
        if: inputs.only == '' && inputs.report_gaps != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          python -m scripts.migrate_s8a_family_merge $args

      - name: Cleanup S8a anniversary artifacts (bogus rows + total)
        # Removes 4 duplicate Pikachu V-UNION panel rows introduced by
        # an earlier import pass with a strict-suffix regex, and lifts
        # sets.S8a.total from 28 → 30 to include the SR + UR secrets.
        # Idempotent no-op on subsequent runs.
        if: inputs.only == '' && inputs.report_gaps != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          python -m scripts.cleanup_s8a_anniversary $args

      - name: Import 25th Anniversary singles (S8a-P full, S8a gap fill, S8a-G)
        # After the seed step lands the S8a-P and S8a-G set rows, pull
        # their card lists from TCGCSV so the /sets/S8a-P and
        # /sets/S8a-G pages actually show cards, not just sealed. Also
        # runs S8a (23638) so the previously-missing Mew #030 UR
        # backfills alongside any refreshed prices on the other 29.
        # Idempotent: existing cards get an UPDATE only when a field
        # changes; new ones are inserted.
        if: inputs.only == '' && inputs.report_gaps != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          python -m scripts.import_jp_group_cards \
            --pairs "23638:S8a,23847:S8a:P,23838:S8a:G" $args

      - name: Repair S8a base card images (TCGCSV fallback URLs)
        # Reseats image_small/image_large on the 30 base cards to
        # correctly-sized TCGCSV URLs so quality never regresses below
        # 400w even if the Bulbapedia HD restore below misses a card.
        # Idempotent; no-op after first successful run.
        if: inputs.only == '' && inputs.report_gaps != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          python -m scripts.repair_s8a_base_images $args

      # NOTE: the Bulbapedia HD restore step used to live here but was
      # removed on 2026-07-15 after LO reported broken tiles in the
      # browser. archives.bulbagarden.net returns HTTP 403 for any GET
      # with a `Referer` set to www.pulllist.org (hotlink protection
      # kicked in system-wide, not just weserv). Bulbapedia scans can
      # only be fetched server-side with no referer, so they're
      # unusable for user-facing `<img>` tags. TCGCSV `_400w` (set
      # earlier by repair_s8a_base_images) is the browser-safe
      # fallback for all 41 non-Limitless cards.

      - name: Upgrade S8a base to JP-native scans from Limitless
        # Bulbapedia only hosts EN "Celebrations" scans — text on the
        # card is English even though the artwork is identical to the
        # JP release. Limitless hosts JP scans for S8a-1..29 on their
        # CDN, so this step replaces those 29 URLs with the JP versions.
        # Mew UR #30 + S8a-P{1-25} + S8a-G{1-15} stay on the Bulbapedia
        # URLs — Limitless doesn't have them.
        if: inputs.only == '' && inputs.report_gaps != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          python -m scripts.restore_s8a_jp_scans_limitless $args

      - name: Ingest JP sealed products
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          if [ -n "${{ inputs.only }}" ]; then
            args="$args --only ${{ inputs.only }}"
          fi
          if [ "${{ inputs.report_gaps }}" = "true" ]; then
            args="$args --report-gaps"
          fi
          python -m scripts.ingest_jp_sealed $args
