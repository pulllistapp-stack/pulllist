name: CN 30th cleanup + promote (one-shot)

# Deletes the me30-cn stub row and promotes zhcn-c-b09b95caa5 into
# the 30th Celebration series so CN's actual 30th entry groups with
# the EN/JP campaign. Idempotent; safe to re-run.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (print plan, no writes)"
        required: false
        default: "false"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="--dry-run"
          fi
          python -m scripts.promote_cn_30th_and_cleanup_stub $args
