name: Weekly snapshot retention

on:
  schedule:
    # 10:00 UTC every Sunday = 06:00 EDT / 05:00 EST. After both daily
    # syncs (eBay 07:00 UTC, TCGplayer 08:00 UTC) have finished so the
    # compressor sees a clean, settled state.
    - cron: "0 10 * * 0"
  workflow_dispatch:

jobs:
  compress:
    runs-on: ubuntu-latest
    # The first run on a fresh DB chunked-deleted 324k rows in ~60s.
    # Weekly runs touch a much smaller delta so this is generous.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply tiered snapshot retention
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
        run: python -m scripts.compress_snapshots
