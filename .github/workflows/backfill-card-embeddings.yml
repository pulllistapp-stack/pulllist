name: Backfill card MobileCLIP embeddings

# Computes a MobileCLIP-S1 image embedding for every catalog card
# and uploads the packed matrix + id list to Cloudflare R2. Backend
# then loads that index on first bulk-scan request. Rerun after any
# major catalog ingest (new sets, image URL fixes).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Count-only, no fetches / no embeds / no upload"
        required: false
        default: "false"
      limit:
        description: "Cap number of cards (blank = all)"
        required: false
        default: ""
      concurrency:
        description: "Concurrent HTTP fetches"
        required: false
        default: "16"

jobs:
  backfill:
    runs-on: ubuntu-latest
    # 43 k cards. HTTP fetch ~15 min at concurrency 16. Embedding
    # is the bottleneck: batched forward passes (BATCH_SIZE = 32)
    # land ~30-50 cards/s on the ubuntu-latest CPU runner, so
    # embed phase is ~15-25 min. Bumped to 360 min (GitHub Actions
    # free-tier hard cap — the runner itself terminates at 6 h) so
    # even a worst-case slow-embed run finishes instead of hitting
    # timeout with hours of work lost.
    timeout-minutes: 360
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install runtime deps
        run: pip install -r requirements.txt
      - name: Install embedding backfill deps
        # Kept out of requirements.txt so the production backend on
        # Render doesn't pull ~1 GB of ML libs it never uses at
        # request time — the matcher endpoint only needs numpy + boto3.
        # CPU-only torch wheel so the runner doesn't waste time on
        # CUDA extras it can't use.
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu \
            "torch==2.5.1"
          pip install \
            "transformers==4.46.3" \
            "safetensors==0.4.5"
      - name: Run backfill
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_EMBEDDINGS: ${{ secrets.R2_BUCKET_EMBEDDINGS || 'pulllist-setslogosbackup' }}
        run: |
          args="--concurrency ${{ inputs.concurrency }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          if [ -n "${{ inputs.limit }}" ]; then
            args="$args --limit ${{ inputs.limit }}"
          fi
          python -m scripts.backfill_card_embeddings $args
