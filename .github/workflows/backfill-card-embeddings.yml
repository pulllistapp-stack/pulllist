name: Backfill card MobileCLIP embeddings

# Computes a MobileCLIP-S1 image embedding for every catalog card
# and uploads the packed matrix + id list to Cloudflare R2. Backend
# then loads that index on first bulk-scan request. Rerun after any
# major catalog ingest (new sets, image URL fixes).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Count-only, no fetches / no embeds / no upload"
        required: false
        default: "false"
      limit:
        description: "Cap number of cards (blank = all)"
        required: false
        default: ""
      concurrency:
        description: "Concurrent HTTP fetches"
        required: false
        default: "16"

jobs:
  backfill:
    runs-on: ubuntu-latest
    # ~43 k cards. HTTP fetch is fast (~15 min at concurrency 16).
    # Embedding on CPU is the bottleneck (~40-80 cards/s), so budget
    # ~15-20 min for that phase. Padding for cold pip install + R2
    # upload.
    timeout-minutes: 90
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install runtime deps
        run: pip install -r requirements.txt
      - name: Install embedding backfill deps
        # Kept out of requirements.txt so the production backend on
        # Render doesn't pull ~1 GB of ML libs it never uses at
        # request time — the matcher endpoint only needs numpy + boto3.
        run: |
          pip install \
            "transformers==4.46.3" \
            "optimum[onnxruntime]==1.24.0" \
            "onnxruntime==1.20.1"
      - name: Run backfill
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_EMBEDDINGS: ${{ secrets.R2_BUCKET_EMBEDDINGS || 'pulllist-setslogosbackup' }}
        run: |
          args="--concurrency ${{ inputs.concurrency }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          if [ -n "${{ inputs.limit }}" ]; then
            args="$args --limit ${{ inputs.limit }}"
          fi
          python -m scripts.backfill_card_embeddings $args
