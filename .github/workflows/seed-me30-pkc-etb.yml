name: Seed me30 Pokemon Center ETB (one-shot)

# Adds the Pokemon Center exclusive Elite Trainer Box variant to
# the me30 sealed products list. TCGCSV doesn't track this SKU
# separately, so the row is synthetic — same image as the regular
# ETB (p-704143), null prices. Idempotent (skips if the row exists).

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scripts.seed_me30_pkc_etb
