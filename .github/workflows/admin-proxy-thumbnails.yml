name: Admin — proxy thumbnails through weserv

# One-off / ad-hoc admin tool. Self-healing: wraps any raw external
# thumbnail URL through images.weserv.nl so cross-origin loads aren't
# blocked by hot-link-protected sources. Skips anything already
# proxied or hosted on a trusted domain. Idempotent — re-running is
# a no-op.

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/newsbot/requirements.txt

      - name: Install httpx
        run: pip install 'httpx>=0.27,<1.0'

      - name: Run thumbnail proxy migration
        env:
          PULLLIST_API_BASE: ${{ secrets.PULLLIST_API_BASE || 'https://api.pulllist.org/api/v1' }}
          NEWSBOT_ADMIN_EMAIL: ${{ secrets.NEWSBOT_ADMIN_EMAIL }}
          NEWSBOT_ADMIN_PASSWORD: ${{ secrets.NEWSBOT_ADMIN_PASSWORD }}
        run: python -m scripts.admin_proxy_thumbnails
