name: Backfill JP set logos (Limitless CDN)

# Manual-only. Sweeps every JP set with logo_url IS NULL and probes
# https://s3.limitlesstcg.com/sets/jp/{SET_ID}.png. Where 200,
# writes the URL onto ``sets.logo_url``. Case-insensitive fallback
# covers PullList's mixed-case IDs (SVLN vs svLN).
#
# Runs against prod via ``secrets.DATABASE_URL``. Idempotent — a
# repeat trigger only touches sets whose logo is still NULL.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (probe, don't write)"
        required: false
        default: "false"
      only:
        description: "Limit to a single set_type (DECK, PROMO_NEW, PROMO_LEGACY). Blank = all."
        required: false
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe Limitless CDN + write logo_url
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          if [ -n "${{ inputs.only }}" ]; then
            args="$args --only ${{ inputs.only }}"
          fi
          python -m scripts.backfill_jp_set_logos_limitless $args

      - name: Promote DECK sets to their sealed product photo
        # Phase 1: LO's ask — swap the generic set logo for the actual
        # product photo where we have a sealed TCGCSV image. Covers
        # ~28/118 DECK sets. Phase 2 (eBay) picks up the rest.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          python -m scripts.backfill_deck_logos_from_sealed $args

      - name: Search eBay for remaining DECK box photos
        # Phase 2: for DECK sets still on the Limitless generic logo
        # (no TCGCSV sealed image), hit eBay Browse API with the
        # set's name_en to pull a real listing photo. Uses the shared
        # EbayClient — same App ID as daily-ebay-snapshot.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EBAY_ENV: production
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          LOG_LEVEL: INFO
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="$args --dry-run"
          fi
          python -m scripts.backfill_deck_logos_from_ebay $args
