name: Link subset → parent Sets (one-shot)

# Wires the known Shiny Vault / Trainer Gallery / Galarian Gallery /
# Classic Collection subsets to their parent expansions so the /sets
# grid stops rendering duplicate tiles. Idempotent; safe to re-run.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (print plan, no writes)"
        required: false
        default: "false"

jobs:
  link:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="--dry-run"
          fi
          python -m scripts.link_subset_parents $args
