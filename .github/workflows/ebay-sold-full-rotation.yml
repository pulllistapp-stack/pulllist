name: eBay sold-listing scrape — full 4-tier rotation (parallel)

# Matrix-parallel version: each grade tier runs on its own hosted
# runner (its own IP) simultaneously. Wall clock ~= single-tier time
# instead of sum-of-tiers, and 4 different runner IPs mean DataDome
# spreads the load across independent fingerprints.
#
# Budget note (GH Actions free tier 2000 min/mo for private repos):
# with defaults limit=300, min-price=30, throttle=2000ms, each tier
# runs ~= 110 min. Four parallel tiers bill ~440 min per full sweep
# but wall time is ~= 110 min (~2 hours). Four full sweeps/mo fits
# well inside 2000 min.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max chase cards PER TIER"
        required: false
        default: "300"
      min_price:
        description: "Skip cards below this market_price_usd"
        required: false
        default: "30"
      throttle_ms:
        description: "Delay between cards (ms)"
        required: false
        default: "2000"
      skip_if_recent_days:
        description: "Skip cards refreshed in last N days (0 = re-scrape everything, 14 = weekly-sweep style)"
        required: false
        default: "0"
      ipg:
        description: "eBay listings per page (60 default, 120 for wider pool)"
        required: false
        default: "60"
      max_attempts:
        description: "Retry budget per query (2 default, 3 for gap-fill runs)"
        required: false
        default: "2"
      include_asking_fallback:
        description: "When sold n<5, retry same query for active listings (source=ebay_asking)"
        required: false
        default: "true"
        type: choice
        options: [ "true", "false" ]

jobs:
  scrape:
    runs-on: ubuntu-latest
    # ~110 min at 300 cards × 22s/card. 200 gives safety margin for
    # DataDome retries + occasional slow queries.
    timeout-minutes: 200
    strategy:
      # Never cancel siblings — one tier's bad night should not
      # blow away the other three's data.
      fail-fast: false
      matrix:
        # Named pairs so the runner-facing log line is human-readable
        # ("Scrape PSA 10") without shell-escape headaches.
        tier:
          - { label: "PSA 10", slug: "psa10" }
          - { label: "PSA 9",  slug: "psa9"  }
          - { label: "CGC 10", slug: "cgc10" }
          - { label: "CGC 9",  slug: "cgc9"  }
          - { label: "BGS 10", slug: "bgs10" }
          - { label: "BGS 9.5", slug: "bgs95" }
          - { label: "BGS 9",  slug: "bgs9"  }
          - { label: "TAG 10", slug: "tag10" }
          - { label: "TAG 9.5", slug: "tag95" }
          - { label: "TAG 9",  slug: "tag9"  }
    name: Scrape ${{ matrix.tier.label }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          pip install playwright playwright-stealth
          python -m playwright install --with-deps chromium

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Scrape ${{ matrix.tier.label }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          FALLBACK_FLAG=""
          if [ "${{ github.event.inputs.include_asking_fallback }}" != "false" ]; then
            FALLBACK_FLAG="--include-asking-fallback"
          fi
          xvfb-run --auto-servernum \
            python -m scripts.scrape_ebay_sold \
              --graded-tier "${{ matrix.tier.label }}" \
              --limit "${{ github.event.inputs.limit || '300' }}" \
              --min-price "${{ github.event.inputs.min_price || '30' }}" \
              --throttle-ms "${{ github.event.inputs.throttle_ms || '2000' }}" \
              --ipg "${{ github.event.inputs.ipg || '60' }}" \
              --max-attempts "${{ github.event.inputs.max_attempts || '2' }}" \
              --skip-if-recent-days "${{ github.event.inputs.skip_if_recent_days || '0' }}" \
              $FALLBACK_FLAG
