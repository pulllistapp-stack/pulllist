name: Editorial column

# Phase B Sprint 6 — human-triggered long-form column. LO fires this
# manually with a topic; the source pulls related cards + web context
# and Claude drafts a 1500-2500 word essay in Collectory-reads voice.

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Column topic. Concrete works best — "30th Celebration Lineup Preview" beats "Anniversary Sets". Required.'
        required: true
        type: string
      dry_run:
        description: 'Dry run (1 = generate + log only; 0 = publish draft)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '0'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/newsbot/requirements.txt

      - name: Install newsbot deps
        run: pip install -r newsbot/requirements.txt

      - name: Run newsbot (editorial_column only)
        env:
          PULLLIST_API_BASE: ${{ secrets.PULLLIST_API_BASE || 'https://api.pulllist.org/api/v1' }}
          NEWSBOT_ADMIN_EMAIL: ${{ secrets.NEWSBOT_ADMIN_EMAIL }}
          NEWSBOT_ADMIN_PASSWORD: ${{ secrets.NEWSBOT_ADMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          EDITORIAL_COLUMN_ENABLED: "1"
          EDITORIAL_COLUMN_TOPIC: ${{ inputs.topic }}
          AUCTION_HIGHLIGHTS_ENABLED: "0"
          ILLUSTRATOR_FEATURE_ENABLED: "0"
          PRICE_CLUB_ENABLED: "0"
          SET_OVERVIEW_ENABLED: "0"
          MARKET_REPORT_ENABLED: "0"
          WEB_SEARCH_ENABLED: "0"
          DAILY_POST_LIMIT: "1"
          DRY_RUN: ${{ inputs.dry_run || '0' }}
          LOG_LEVEL: INFO
        run: python -m newsbot.main
