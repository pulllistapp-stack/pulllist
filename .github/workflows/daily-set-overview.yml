name: Daily set overview

# Phase B Sprint 2 — checks the catalog every morning for sets that
# shipped in the last 14 days. When there's one (or a few, for
# JP-EN parallels), emits Collectory-style overview posts with the
# set's top cards by market price. Silent when nothing new.

on:
  schedule:
    # 13:00 UTC = EDT 9:00 AM. An hour after daily-newsbot to avoid
    # concurrent Anthropic + Render load. Overview posts are
    # complementary to the news feed — not competing for the same
    # daily slate.
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (1 = generate + log only; 0 = publish drafts)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '0'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/newsbot/requirements.txt

      - name: Install newsbot deps
        run: pip install -r newsbot/requirements.txt

      - name: Run newsbot (set_overview only)
        env:
          PULLLIST_API_BASE: ${{ secrets.PULLLIST_API_BASE || 'https://api.pulllist.org/api/v1' }}
          NEWSBOT_ADMIN_EMAIL: ${{ secrets.NEWSBOT_ADMIN_EMAIL }}
          NEWSBOT_ADMIN_PASSWORD: ${{ secrets.NEWSBOT_ADMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Only set_overview fires here. Turn off the news + market
          # sources so this workflow can never touch them.
          SET_OVERVIEW_ENABLED: "1"
          MARKET_REPORT_ENABLED: "0"
          WEB_SEARCH_ENABLED: "0"
          # Cap posts per run — set_overview emits up to
          # MAX_SETS_PER_RUN (currently 3) but daily_post_limit is
          # the final gate. 3 matches so nothing is silently dropped.
          DAILY_POST_LIMIT: "3"
          DRY_RUN: ${{ inputs.dry_run || '0' }}
          LOG_LEVEL: INFO
        run: python -m newsbot.main
