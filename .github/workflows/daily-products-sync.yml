name: Daily sealed-product price sync

on:
  schedule:
    # 08:15 UTC every day. Runs 15 min after the singles sync at 08:00
    # UTC so both hit TCGCSV's daily 20:00 UTC feed but don't compete
    # for connections. sealed products are ~1000 rows vs 30k singles, so
    # completes in under a minute.
    - cron: "15 8 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sealed product price sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
        run: python -m scripts.sync_products_daily
