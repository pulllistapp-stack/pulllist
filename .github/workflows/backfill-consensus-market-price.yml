name: Backfill consensus market_price (one-shot)

# Recomputes Card.market_price_usd = (tcg + ebay) / 2 for every
# card that has both signals available. Used once after landing
# the "set-page and card-detail show the same number" fix so the
# catalog reflects consensus TODAY instead of drifting for another
# 24h until the nightly TCGCSV sync runs. Idempotent — safe to
# re-run.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (count eligible cards, no writes)"
        required: false
        default: "false"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          args=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args="--dry-run"
          fi
          python -m scripts.backfill_consensus_market_price $args
