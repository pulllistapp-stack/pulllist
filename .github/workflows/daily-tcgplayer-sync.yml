name: Daily TCGplayer price sync

on:
  schedule:
    # 08:00 UTC every day = 04:00 EDT / 03:00 EST. 1h after the eBay
    # snapshot so they don't clash on the Render free tier. Both finish
    # before morning in both DST modes.
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # 30 sets × ~250 cards × (pokemontcg.io fetch + UPDATE + snapshot INSERT)
    # can run past 30m on Render's network. 90m matches the eBay workflow and
    # leaves comfortable headroom.
    timeout-minutes: 90
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # TCGplayer prices come from TCGCSV — daily cadence (UTC 20:00),
      # owns cards.tcgplayer_prices + tcgplayer source snapshots end-to-end.
      #
      # Tier filter (--tier daily, the default): only sync cards we
      # consider "live" — priced ≥$1 OR unpriced (so newly mapped
      # cards get their first price) OR in a set released ≤30 days
      # ago (launch-week chase often starts <$1 and surges fast).
      # The bulk long-tail (<$1, set >30d old) runs in its own
      # monthly workflow — see .github/workflows/monthly-tcgplayer-bulk-sync.yml.
      # Cuts daily Neon egress roughly in half without losing freshness
      # where collectors actually look.
      - name: TCGplayer sync (TCGCSV) — daily tier
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
        run: python -m scripts.sync_tcgcsv_daily --tier daily

      # pokemontcg.io still covers Cardmarket — TCGCSV doesn't expose it
      # and Cardmarket's own data dumps are hard to parse. The
      # --cardmarket-only flag keeps this step away from TCGplayer fields.
      - name: Cardmarket sync (pokemontcg.io)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Optional but recommended — bumps pokemontcg.io rate limit
          # from 1k/hour (anonymous) to 20k/day (free key).
          POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}
          LOG_LEVEL: INFO
        run: python -m scripts.sync_tcgplayer_prices --cardmarket-only
