name: Daily TCGplayer price sync

on:
  schedule:
    # 04:00 UTC every day — 1h after the eBay snapshot, so they don't clash
    # on the Render free tier and the dashboard sees both done by morning.
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TCGplayer + Cardmarket price sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Optional but recommended — bumps pokemontcg.io rate limit
          # from 1k/hour (anonymous) to 20k/day (free key).
          POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}
          LOG_LEVEL: INFO
        run: python -m scripts.sync_tcgplayer_prices
